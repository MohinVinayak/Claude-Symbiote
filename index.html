<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symbiote - Claude Style</title>
<style>
  :root {
    --bg-dark: #161514; /* Anthropic's sophisticated warm charcoal */
    --border-light: rgba(230, 220, 210, 0.08);
    --text-muted: #8d8a86;
    /* A silky, high-end copper/linen gradient (premium, not neon) */
    --claude-gradient: linear-gradient(90deg, #D59F82, #F4E0D4, #C58167, #D59F82);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 100vw;
    height: 100vh;
    background: transparent;
    font-family: -apple-system, 'SF Pro Display', 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    user-select: none;
    overflow: hidden;
  }

  body.debug-mode {
    background: #0d0d0f;
  }

  /* ─── The Claude Pill ───────────────────────────────── */
  #pill-container {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-dark);
    padding: 10px 24px 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--border-light);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center;
    cursor: pointer;
    min-width: 140px;
  }

  #pill-container:active {
    transform: scale(0.96);
  }

  #pill-container.thinking {
    border-color: rgba(213, 159, 130, 0.25);
    box-shadow: 0 6px 32px rgba(213, 159, 130, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }

  #pill-container.streaming_text {
    border-color: rgba(155, 204, 195, 0.2);
  }
  
  #pill-container.streaming_code {
    border-color: rgba(212, 184, 126, 0.2);
  }

  /* ─── Sparkle Icon ──────────────────────────────────── */
  .sparkle-wrapper {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .sparkle-svg {
    width: 100%;
    height: 100%;
    fill: #e3e3e3;
    transition: transform 0.3s ease, fill 0.3s ease;
  }

  /* Thinking Animation */
  #pill-container.thinking .sparkle-svg {
    fill: url(#claude-grad);
    animation: pulse-spin 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  /* Streaming Animations */
  #pill-container.streaming_text .sparkle-svg,
  #pill-container.streaming_code .sparkle-svg {
    animation: pulse-gentle 1.5s ease-in-out infinite;
  }

  @keyframes pulse-spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(90deg) scale(1.15); }
    100% { transform: rotate(180deg) scale(1); }
  }

  @keyframes pulse-gentle {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  /* ─── Text Styling ──────────────────────────────────── */
  #status-text {
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: #e3e3e3;
    transition: opacity 0.2s ease;
    white-space: nowrap;
  }

  #pill-container.thinking #status-text {
    background: var(--claude-gradient);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradient-shift 3s linear infinite;
  }

  @keyframes gradient-shift {
    0% { background-position: 100% 50%; }
    100% { background-position: -200% 50%; }
  }

  /* ─── Debug Controls ────────────────────────────────── */
  #debug-panel {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  
  body.debug-mode #debug-panel {
    display: flex;
  }

  #hint {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.4);
  }

</style>
</head>
<body>

  <div id="pill-container">
    <div class="sparkle-wrapper">
      <svg class="sparkle-svg" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="claude-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#D59F82" />
            <stop offset="50%" stop-color="#F4E0D4" />
            <stop offset="100%" stop-color="#C58167" />
          </linearGradient>
        </defs>
        <path d="m3.127 10.604 3.135-1.76.053-.153-.053-.085H6.11l-.525-.032-1.791-.048-1.554-.065-1.505-.08-.38-.081L0 7.832l.036-.234.32-.214.455.04 1.009.069 1.513.105 1.097.064 1.626.17h.259l.036-.105-.089-.065-.068-.064-1.566-1.062-1.695-1.121-.887-.646-.48-.327-.243-.306-.104-.67.435-.48.585.04.15.04.593.456 1.267.981 1.654 1.218.242.202.097-.068.012-.049-.109-.181-.9-1.626-.96-1.655-.428-.686-.113-.411a2 2 0 0 1-.068-.484l.496-.674L4.446 0l.662.089.279.242.411.94.666 1.48 1.033 2.014.302.597.162.553.06.17h.105v-.097l.085-1.134.157-1.392.154-1.792.052-.504.25-.605.497-.327.387.186.319.456-.045.294-.19 1.23-.37 1.93-.243 1.29h.142l.161-.16.654-.868 1.097-1.372.484-.545.565-.601.363-.287h.686l.505.751-.226.775-.707.895-.585.759-.839 1.13-.524.904.048.072.125-.012 1.897-.403 1.024-.186 1.223-.21.553.258.06.263-.218.536-1.307.323-1.533.307-2.284.54-.028.02.032.04 1.029.098.44.024h1.077l2.005.15.525.346.315.424-.053.323-.807.411-3.631-.863-.872-.218h-.12v.073l.726.71 1.331 1.202 1.667 1.55.084.383-.214.302-.226-.032-1.464-1.101-.565-.497-1.28-1.077h-.084v.113l.295.432 1.557 2.34.08.718-.112.234-.404.141-.444-.08-.911-1.28-.94-1.44-.759-1.291-.093.053-.448 4.821-.21.246-.484.186-.403-.307-.214-.496.214-.98.258-1.28.21-1.016.19-1.263.112-.42-.008-.028-.092.012-.953 1.307-1.448 1.957-1.146 1.227-.274.109-.477-.247.045-.44.266-.39 1.586-2.018.956-1.25.617-.723-.004-.105h-.036l-4.212 2.736-.75.096-.324-.302.04-.496.154-.162 1.267-.871z" />
      </svg>
    </div>
    <span id="status-text">Idle</span>
  </div>

  <div id="debug-panel">
    <p id="hint">Click the pill, or press Space/Right Arrow to cycle states</p>
  </div>

<script>
  // Tauri Environment Detection
  const IS_TAURI = !!window.__TAURI_INTERNALS__ || !!window.__TAURI_IPC__ || ('__TAURI__' in window) || typeof window.__TAURI__ !== 'undefined';
  
  if (!IS_TAURI) {
    document.body.classList.add('debug-mode');
  }

  const pill = document.getElementById('pill-container');
  const statusText = document.getElementById('status-text');
  const sparkle = document.querySelector('.sparkle-svg');

  const STATES = {
    idle:           { label: 'Idle',                 color: '#8d8a86' },
    thinking:       { label: 'Claude is thinking…',  color: 'url(#claude-grad)' },
    streaming_text: { label: 'Writing…',             color: '#9bccc3' }, /* Premium Sage */
    streaming_code: { label: 'Writing code…',        color: '#d4b87e' }, /* Premium Muted Gold */
    error:          { label: 'Something went wrong', color: '#c46c6c' }, /* Muted Brick Red */
    done:           { label: 'Done ✓',               color: '#a0b3c6' }, /* Sleek Slate Blue */
    disconnected:   { label: 'Disconnected',         color: '#5e5c5a' }
  };

  function setState(state) {
    const config = STATES[state] || STATES.idle;
    
    // Reset classes
    pill.className = '';
    
    // Add active state class if applicable
    if (['thinking', 'streaming_text', 'streaming_code'].includes(state)) {
      pill.classList.add(state);
    }
    
    // Update text
    statusText.textContent = config.label;
    
    // Update icon color (unless it's thinking, which CSS gradient handles)
    if (state !== 'thinking') {
      sparkle.style.fill = config.color;
    } else {
      sparkle.style.fill = ''; // Let CSS take over
    }
  }

  // --- WebSocket (module-scoped so focusClaude can reach it) ---
  let ws = null;

  if (IS_TAURI) {
    let delay = 500, timer = null;

    function connect() {
      try { ws = new WebSocket('ws://127.0.0.1:7429'); } catch { retry(); return; }

      ws.onopen = () => {
        delay = 500;
        clearTimeout(timer);
        setState('idle');
      };

      ws.onmessage = ({ data }) => {
        try {
          const m = JSON.parse(data);
          if (m?.state && STATES[m.state]) setState(m.state);
        } catch {}
      };

      ws.onclose = () => {
        timer = setTimeout(() => setState('disconnected'), 1200);
        retry();
      };

      ws.onerror = () => ws.close();
    }

    function retry() {
      clearTimeout(timer);
      timer = setTimeout(() => { delay = Math.min(delay * 1.5, 8000); connect(); }, delay);
    }

    connect();
  }

  // --- Click Logic ---
  function focusClaude() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ command: 'focus_claude' }));
    }
  }

  if (IS_TAURI) {
    pill.addEventListener('click', focusClaude);
  } else {
    // Debug mode — cycle states on click + keyboard
    const CYCLE = Object.keys(STATES);
    let currentIdx = 0;

    function cycleState() {
      currentIdx = (currentIdx + 1) % CYCLE.length;
      setState(CYCLE[currentIdx]);
    }

    pill.addEventListener('click', cycleState);

    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'ArrowRight') {
        e.preventDefault();
        cycleState();
      }
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        currentIdx = (currentIdx - 1 + CYCLE.length) % CYCLE.length;
        setState(CYCLE[currentIdx]);
      }
    });
  }

  // Set initial state
  setState('idle');

</script>
</body>
</html>
